name: Nightly

on:
  push:
    branches:
      - develop
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    name: nightly
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

      - name: Verify signing secrets
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}"
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Build nightly APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release

      - name: Prepare asset
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk learnkana-nightly.apk
          git tag -f nightly "$GITHUB_SHA"
          git push origin nightly --force

      - name: Publish nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          overwrite_files: true
          files: learnkana-nightly.apk
          make_latest: false
